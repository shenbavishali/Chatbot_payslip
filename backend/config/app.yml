app:
  name: chatbot-payslip-api
  cors_origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"
    - "http://localhost:5174"
    - "http://127.0.0.1:5174"

database:
  # Override with MYSQL_DSN in production.
  dsn: "mysql+pymysql://payroll_user:payroll_password@localhost:3306/payroll_chatbot"

payroll_api:
  timeout_seconds: 20
  endpoints:
    payslip: "http://localhost:8081/coreConnect/api/mcp"
    pay_summary: "http://localhost:8081/coreConnect/api/mcp"
